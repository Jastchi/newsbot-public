substitutions:
  _REGION: europe-west1
  _SERVICE: newsbot
  _IMAGE: newsbot-web
  _SITE_DOMAIN: thenewsbot.net

steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: create-repo
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud artifacts repositories describe ${_SERVICE} --location=${_REGION} || \
        gcloud artifacts repositories create ${_SERVICE} --repository-format=docker --location=${_REGION}
  
  # 1. Build the image
  - name: "gcr.io/cloud-builders/docker"
    id: build
    env:
      - "DOCKER_BUILDKIT=1"
    args:
      - "build"
      - "-f"
      - "Dockerfile.web"
      - "--target"
      - "production"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE}/${_IMAGE}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE}/${_IMAGE}:latest"
      - "."

  # 2. PUSH the image explicitly before deploying
  - name: "gcr.io/cloud-builders/docker"
    id: push
    waitFor: ["build"]
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE}/${_IMAGE}:${SHORT_SHA}"

  # 3. Run database migrations via a Cloud Run Job before deploying
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: migrate
    entrypoint: "bash"
    waitFor: ["push"]
    args:
      - "-c"
      - |
        gcloud run jobs create newsbot-migrate \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE}/${_IMAGE}:${SHORT_SHA} \
          --region ${_REGION} \
          --command "python" \
          --args "src/web/manage.py,migrate,--noinput" \
          --set-secrets "DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest" \
          --set-env-vars "PYTHONPATH=/app/src,DJANGO_SETTINGS_MODULE=web.web.settings" \
          --task-timeout 120s \
          --quiet 2>/dev/null || \
        gcloud run jobs update newsbot-migrate \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE}/${_IMAGE}:${SHORT_SHA} \
          --region ${_REGION} \
          --command "python" \
          --args "src/web/manage.py,migrate,--noinput" \
          --set-secrets "DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest" \
          --set-env-vars "PYTHONPATH=/app/src,DJANGO_SETTINGS_MODULE=web.web.settings" \
          --task-timeout 120s
        gcloud run jobs execute newsbot-migrate --region ${_REGION} --wait

  # 4. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy
    entrypoint: "gcloud"
    waitFor: ["migrate"]
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE}/${_IMAGE}:${SHORT_SHA}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--update-env-vars"
      - "SITE_DOMAIN=${_SITE_DOMAIN}"

# Keeps the images tagged in the build history
images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE}/${_IMAGE}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_SERVICE}/${_IMAGE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY