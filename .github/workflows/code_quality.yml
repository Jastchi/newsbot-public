name: "Code Quality Checks [auto]"
# Ruff lint, ty type check, and a check that blocks `# noqa` / `# type: ignore`.

on:
  push:
    branches: ["main", "renovate/**"]
  pull_request:
    branches: [ '**' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ignore-comments:
    name: Check for Ignore Comments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check for ignore comments
        run: |
          if grep -r "# type: ignore\|# noqa\|# ruff: ignore\|# ruff: noqa\|# ignore" --include="*.py" .; then
            echo "Found ignore comments — fix the underlying issue"
            exit 1
          fi

  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          ignore-nothing-to-cache: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: ".python-version"
      - run: uvx --refresh ruff check

  type-check:
    name: Type Check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          ignore-nothing-to-cache: true
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: ".python-version"
      - run: uv sync
      - run: chmod +x src/web/manage.py
      - run: uvx --refresh ty check
