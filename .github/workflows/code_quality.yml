name: "Code Quality Checks [auto]"
# Ruff lint, ty type check, and a check that blocks `# noqa` / `# type: ignore`.

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ '**' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ignore-comments:
    name: Check for Ignore Comments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for ignore comments
        run: |
          if grep -r "# type: ignore\|# noqa\|# ruff: ignore\|# ruff: noqa\|# ignore" --include="*.py" .; then
            echo "Found ignore comments — fix the underlying issue"
            exit 1
          fi

  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          ignore-nothing-to-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - run: uvx --refresh ruff check

  type-check:
    name: Type Check (ty)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          ignore-nothing-to-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - run: uv sync
      - run: chmod +x src/web/manage.py
      - run: uvx --refresh ty check
