name: "Security Scanning"

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
  schedule:
    - cron: '0 0 * * 1' 

jobs:
  changes:
    uses: ./.github/workflows/_paths_filter.yml

  bandit:
    name: Bandit (SAST)
    needs: changes
    if: ${{ github.event_name == 'schedule' || needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: ./.github/actions/setup-python
      
      - name: Install Bandit
        run: pip install bandit
      
      - name: Run Bandit
        run: |
          bandit -r src/ -ll -f txt -o bandit-report.txt && EXIT_CODE=$? || EXIT_CODE=$?
          cat bandit-report.txt
          exit $EXIT_CODE
      
      - name: Save Bandit Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-security-report
          path: bandit-report.txt

  safety:
    name: Safety (Dependency Check)
    needs: changes
    if: ${{ github.event_name == 'schedule' || needs.changes.outputs.code_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      
      - name: Export dependencies
        run: uv export --format requirements-txt > requirements.txt
      
      - name: Run Safety
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          uvx safety scan --key $SAFETY_API_KEY --file requirements.txt