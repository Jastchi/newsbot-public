name: "Paths Filter (reusable)"
# Single source of truth for "did any code-relevant path change?".
# Called by other workflows as a gate job; they condition their real jobs
# on the `code_changed` output. Update the ignore list below to tune what
# counts as a no-op change (docs, config, unrelated workflows, ...).

on:
  workflow_call:
    outputs:
      code_changed:
        description: "True if any non-ignored path changed"
        value: ${{ jobs.filter.outputs.code_changed }}

jobs:
  filter:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        with:
          token: ''
          filters: |
            code:
              - '**'
              # Docs & text
              - '!**/*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!test_output.txt'
              # Tooling / editor / config not used by CI
              - '!renovate.json'
              - '!.gitignore'
              - '!.pre-commit-config.yaml'
              - '!.editorconfig'
              - '!.vscode/**'
              - '!.cursor/**'
              - '!.claude/**'
              - '!cloudbuild.yaml'
              # Runtime output dirs that should never drive a build
              - '!reports/**'
              - '!logs/**'
              # Workflows unrelated to build / tests / lint / security
              - '!.github/workflows/archive_old_articles.yml'
              - '!.github/workflows/sync_to_public.yml'
              - '!.github/workflows/push-screenshots.yml'
              - '!.github/workflows/docker_control.yml'
              - '!.github/workflows/docker_self_hosted_triggers.yml'
              - '!.github/workflows/pipeline_production_self_hosted.yml'
              - '!.github/workflows/pipeline_test_self_hosted.yml'
              - '!.github/workflows/pipeline_test_self_hosted_docker.yml'
              - '!.github/workflows/tests_docker.yml'
              - '!.github/workflows/tests_self_hosted.yml'
              - '!.github/workflows/tests_self_hosted_docker.yml'
              - '!.github/workflows/set_pending_status.yml'
