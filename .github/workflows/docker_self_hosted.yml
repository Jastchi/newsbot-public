name: "Docker: Build & Run [main, self-hosted]"

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:

jobs:
  changes:
    uses: ./.github/workflows/_paths_filter.yml

  deploy-api:
    name: Deploy API Container
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.code_changed == 'true' }}
    runs-on: self-hosted
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Free runner disk
        run: |
          docker container prune -f
          docker image prune -f

      - name: Build API image
        run: docker build -t newsbot-api:latest --target production -f Dockerfile.api .
      - name: Run migrations
        run: |
          docker run --rm \
            --entrypoint sh \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e ENVIRONMENT="${{ vars.ENVIRONMENT }}" \
            -e DJANGO_SETTINGS_MODULE="web.web.settings" \
            newsbot-api:latest \
            -c "python src/web/manage.py ensure_schema && python src/web/manage.py migrate --noinput"

      - name: Stop and remove existing API container
        run: |
          docker stop newsbot-api || true
          docker rm newsbot-api || true

      - name: Run API container
        run: |
          docker run -d \
            --name newsbot-api \
            --restart unless-stopped \
            -p 9001:8000 \
            -v ${{ vars.API_LOG_DIR }}:/app/logs \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e ENVIRONMENT="${{ vars.ENVIRONMENT }}" \
            -e SUPABASE_SERVICE_KEY="${{ secrets.SUPABASE_SECRET_KEY }}" \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -e EMAIL_ENABLED="${{ vars.EMAIL_ENABLED }}" \
            -e EMAIL_PROVIDER="${{ vars.EMAIL_PROVIDER }}" \
            -e EMAIL_LOGIN="${{ vars.EMAIL_LOGIN }}" \
            -e EMAIL_SENDER="${{ vars.EMAIL_SENDER }}" \
            -e EMAIL_RECIPIENT="${{ vars.EMAIL_RECIPIENT }}" \
            -e EMAIL_PASSWORD="${{ secrets.EMAIL_PASSWORD }}" \
            -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            -e EMAIL_SMTP_SERVER="${{ vars.EMAIL_SMTP_SERVER }}" \
            -e EMAIL_SMTP_PORT="${{ vars.EMAIL_SMTP_PORT }}" \
            -e EMAIL_USE_SSL="${{ vars.EMAIL_USE_SSL }}" \
            -e EMAIL_FOR_CANCELLATION="${{ vars.EMAIL_FOR_CANCELLATION }}" \
            -e NEWSSERVER_BASE_URL="${{ vars.NEWSSERVER_BASE_URL }}" \
            -e ENABLE_SCHEDULER="true" \
            newsbot-api:latest

      - name: Cleanup old images
        run: docker image prune -f

  deploy-web:
    if: false  # Web is hosted elsewhere; set to true to re-enable
    name: Deploy Web Container
    runs-on: self-hosted
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          driver: docker-container

      - name: Build Web image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile.web
          target: production
          tags: newsbot-web:latest
          push: false
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache-web
          cache-to: type=local,dest=/tmp/.buildx-cache-web-new,mode=max
          build-args: |
            STATIC_ROOT=${{ vars.STATIC_ROOT }}

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-web
          mv /tmp/.buildx-cache-web-new /tmp/.buildx-cache-web

      - name: Run migrations
        run: |
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e ENVIRONMENT="${{ vars.ENVIRONMENT }}" \
            -e DJANGO_SETTINGS_MODULE="web.web.settings" \
            newsbot-web:latest \
            sh -c "python src/web/manage.py ensure_schema && python src/web/manage.py migrate --noinput"

      - name: Stop and remove existing Web container
        run: |
          docker stop newsbot-web || true
          docker rm newsbot-web || true

      - name: Run Web container
        run: |
          docker run -d \
            --name newsbot-web \
            --restart unless-stopped \
            -p 9000:8000 \
            -v ${{ vars.API_LOG_DIR }}:/app/logs \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e ENVIRONMENT="${{ vars.ENVIRONMENT }}" \
            -e SUPABASE_SERVICE_KEY="${{ secrets.SUPABASE_SECRET_KEY }}" \
            -e DJANGO_SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
            -e DEBUG="${{ vars.DEBUG }}" \
            -e DJANGO_ALLOWED_HOSTS="${{ vars.DJANGO_ALLOWED_HOSTS }}" \
            -e DJANGO_CSRF_TRUSTED_ORIGINS="${{ vars.DJANGO_CSRF_TRUSTED_ORIGINS }}" \
            -e FORCE_SCRIPT_NAME="${{ vars.FORCE_SCRIPT_NAME }}" \
            -e STATIC_ROOT="${{ vars.STATIC_ROOT }}" \
            -e GOOGLE_OAUTH_CLIENT_ID="${{ vars.GOOGLE_OAUTH_CLIENT_ID }}" \
            -e GOOGLE_OAUTH_CLIENT_SECRET="${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}" \
            -e SITE_DOMAIN="${{ vars.SITE_DOMAIN }}" \
            -e DJANGO_SETTINGS_MODULE="web.web.settings" \
            newsbot-web:latest

  wait-for-containers:
    name: Cool down
    runs-on: self-hosted
    needs: [deploy-api, deploy-web]
    if: always() && needs.deploy-api.result == 'success' && (needs.deploy-web.result == 'success' || needs.deploy-web.result == 'skipped')
    steps:
      - name: Sleep for 30 seconds
        run: sleep 30

  smoke-test:
    needs: [wait-for-containers]
    if: always() && needs.wait-for-containers.result == 'success'
    uses: ./.github/workflows/smoke_test.yml