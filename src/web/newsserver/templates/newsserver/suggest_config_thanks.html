{% extends "newsserver/base.html" %}

{% block title %}Suggestion received – NewsBot{% endblock %}

{% block content %}
<div style="max-width: 560px; margin: 48px 0; text-align: center;">
    <div style="font-size: 2.5rem; margin-bottom: 16px;">&#x2713;</div>
    <h2 style="margin: 0 0 10px 0; font-size: 1.5rem; color: var(--site-primary);">Thanks for the suggestion!</h2>
    <p style="color: var(--text-secondary); margin: 0 0 28px 0;">The admin has been notified and will take a look.</p>
    <a href="{% url 'newsserver:news_schedule' %}" style="display: inline-block; padding: 10px 24px; background: var(--site-primary); color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600;">Back to dashboard</a>
</div>
{% endblock %}
