{% load static %}
<meta name="description" content="Curated news digests with sentiment insights, on the topics you choose, delivered weekly to your inbox.">
<meta property="og:description" content="Topic-based news digests with sentiment insights.">
<meta property="og:site_name" content="The Newsbot">
<meta property="og:type" content="website">
<meta property="og:title" content="The Newsbot">
<meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'newsserver/og-preview.png' %}">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="{{ request.build_absolute_uri }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="The Newsbot">
<meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'newsserver/og-preview.png' %}">
